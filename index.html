<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>生日提醒</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --ink: #1e2428;
      --muted: #63717a;
      --line: #d9e0e3;
      --panel: #ffffff;
      --soft: #f4f7f6;
      --mint: #d9f2e7;
      --mint-strong: #2f8f6f;
      --coral: #e76852;
      --gold: #f3b64b;
      --sky: #4d8fca;
      --shadow: 0 18px 45px rgba(30, 36, 40, .12);
      font-family: "Microsoft YaHei", "PingFang SC", "Inter", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(120deg, rgba(217, 242, 231, .7), rgba(255, 255, 255, .65) 34%, rgba(244, 247, 246, .9)),
        #eef4f2;
      color: var(--ink);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 8px;
      background: var(--mint);
      color: var(--mint-strong);
      box-shadow: inset 0 0 0 1px rgba(47, 143, 111, .2);
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .brand p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      white-space: nowrap;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(30, 36, 40, .14);
    }

    .btn.secondary {
      background: #fff;
      color: var(--ink);
      box-shadow: inset 0 0 0 1px var(--line);
    }

    .btn.warning {
      background: var(--coral);
    }

    .icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: none;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(300px, 380px) 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 255, 255, .88);
      border: 1px solid rgba(217, 224, 227, .9);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .panel-header h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .panel-body {
      padding: 18px;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
    }

    .input,
    .select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    .input:focus,
    .select:focus {
      border-color: var(--mint-strong);
      box-shadow: 0 0 0 4px rgba(47, 143, 111, .13);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
    }

    .toggle-row span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .switch {
      position: relative;
      width: 50px;
      height: 28px;
      flex: none;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #b9c4c8;
      transition: background .18s ease;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      left: 3px;
      top: 3px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .22);
      transition: transform .18s ease;
    }

    .switch input:checked + .slider {
      background: var(--mint-strong);
    }

    .switch input:checked + .slider::before {
      transform: translateX(22px);
    }

    .dropzone {
      display: grid;
      gap: 10px;
      place-items: center;
      min-height: 156px;
      padding: 18px;
      text-align: center;
      border: 1.5px dashed #aab8bd;
      border-radius: 8px;
      background: #fbfdfc;
      transition: border-color .18s ease, background .18s ease;
    }

    .dropzone.dragging {
      border-color: var(--mint-strong);
      background: var(--mint);
    }

    .dropzone strong {
      display: block;
      font-size: 16px;
    }

    .dropzone p,
    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .file-input {
      display: none;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      min-height: 78px;
      padding: 13px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 13px;
    }

    .metric strong {
      display: block;
      margin-top: 6px;
      font-size: 24px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 150px;
      gap: 10px;
      margin-bottom: 12px;
    }

    .list {
      display: grid;
      gap: 10px;
      max-height: 620px;
      overflow: auto;
      padding-right: 3px;
    }

    .person {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .person.due {
      border-color: rgba(231, 104, 82, .55);
      background: #fff7f4;
    }

    .person.tomorrow {
      border-color: rgba(243, 182, 75, .65);
      background: #fffaf0;
    }

    .person-main {
      min-width: 0;
    }

    .name-line {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .name-line strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 17px;
    }

    .badge {
      flex: none;
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--soft);
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
    }

    .badge.today {
      background: var(--coral);
      color: #fff;
    }

    .badge.tomorrow {
      background: var(--gold);
      color: #3f2a00;
    }

    .details {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .icon-btn {
      display: inline-grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border-radius: 8px;
      background: var(--soft);
      color: var(--muted);
      transition: background .18s ease, color .18s ease;
    }

    .icon-btn:hover {
      background: #ffe8e2;
      color: var(--coral);
    }

    .empty {
      display: grid;
      min-height: 230px;
      place-items: center;
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      padding: 24px;
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      display: grid;
      gap: 6px;
      width: min(360px, calc(100vw - 40px));
      padding: 14px 16px;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      box-shadow: var(--shadow);
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast span {
      color: rgba(255, 255, 255, .76);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 860px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .actions {
        justify-content: flex-start;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .summary {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      .app {
        width: min(100% - 22px, 1180px);
        padding-top: 18px;
      }

      .form-row,
      .toolbar {
        grid-template-columns: 1fr;
      }

      .panel-body,
      .panel-header {
        padding-left: 14px;
        padding-right: 14px;
      }

      .person {
        grid-template-columns: 1fr;
      }

      .icon-btn {
        justify-self: end;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M20 12v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8"></path>
            <path d="M2 7h20v5H2z"></path>
            <path d="M12 22V7"></path>
            <path d="M12 7H7.5a2.5 2.5 0 1 1 0-5C11 2 12 7 12 7z"></path>
            <path d="M12 7h4.5a2.5 2.5 0 1 0 0-5C13 2 12 7 12 7z"></path>
          </svg>
        </div>
        <div>
          <h1>生日提醒</h1>
          <p>导入表格或手动添加，数据只保存在本机浏览器里。</p>
        </div>
      </div>
      <div class="actions">
        <button class="btn secondary" id="notifyButton" type="button" title="开启浏览器通知">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path>
            <path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"></path>
          </svg>
          通知权限
        </button>
        <button class="btn secondary" id="exportButton" type="button" title="导出 CSV">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <path d="M7 10l5 5 5-5"></path>
            <path d="M12 15V3"></path>
          </svg>
          导出
        </button>
        <button class="btn secondary" id="calendarButton" type="button" title="导出手机日历文件">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M8 2v4"></path>
            <path d="M16 2v4"></path>
            <path d="M3 10h18"></path>
            <rect x="3" y="4" width="18" height="18" rx="2"></rect>
            <path d="M9 16l2 2 4-5"></path>
          </svg>
          导出日历
        </button>
      </div>
    </header>

    <section class="grid">
      <aside class="panel">
        <div class="panel-header">
          <h2>添加生日</h2>
        </div>
        <div class="panel-body stack">
          <form class="stack" id="birthdayForm">
            <div class="field">
              <label for="nameInput">姓名</label>
              <input class="input" id="nameInput" autocomplete="name" placeholder="例如：小林" required>
            </div>
            <div class="form-row">
              <div class="field">
                <label for="dateInput">生日日期</label>
                <input class="input" id="dateInput" type="date" required>
              </div>
              <div class="field">
                <label for="noteInput">备注</label>
                <input class="input" id="noteInput" placeholder="关系、礼物灵感等">
              </div>
            </div>
            <label class="toggle-row">
              <span>
                <strong>提前一天提醒</strong>
                <span>开启后，明天过生日的人也会出现在提醒里。</span>
              </span>
              <span class="switch">
                <input id="dayBeforeInput" type="checkbox" checked>
                <span class="slider"></span>
              </span>
            </label>
            <button class="btn" type="submit">
              <svg class="icon" viewBox="0 0 24 24">
                <path d="M12 5v14"></path>
                <path d="M5 12h14"></path>
              </svg>
              添加
            </button>
          </form>

          <div class="dropzone" id="dropzone">
            <input class="file-input" id="fileInput" type="file" accept=".csv,.tsv,.txt,.xlsx,.xls">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <path d="M17 8l-5-5-5 5"></path>
              <path d="M12 3v12"></path>
            </svg>
            <div>
              <strong>拖入表格，或点击选择</strong>
              <p>支持 CSV/TSV/TXT；联网加载组件后也可读取 XLSX/XLS。表头可用：姓名、名字、name、生日、birthday、date、dob。</p>
            </div>
            <button class="btn secondary" id="pickFileButton" type="button">选择文件</button>
          </div>

          <p class="hint">如果表格没有表头，会尝试把第一列当姓名、第二列当生日。日期支持 1998-06-12、1998/6/12、6/12、6月12日 等常见格式。</p>
        </div>
      </aside>

      <section class="panel">
        <div class="panel-header">
          <h2>生日列表</h2>
          <button class="btn warning" id="clearButton" type="button" title="清空全部记录">
            <svg class="icon" viewBox="0 0 24 24">
              <path d="M3 6h18"></path>
              <path d="M8 6V4h8v2"></path>
              <path d="M19 6l-1 14H6L5 6"></path>
              <path d="M10 11v5"></path>
              <path d="M14 11v5"></path>
            </svg>
            清空
          </button>
        </div>
        <div class="panel-body">
          <div class="summary">
            <div class="metric">
              <span>总记录</span>
              <strong id="totalCount">0</strong>
            </div>
            <div class="metric">
              <span>今天生日</span>
              <strong id="todayCount">0</strong>
            </div>
            <div class="metric">
              <span>接下来 7 天</span>
              <strong id="weekCount">0</strong>
            </div>
          </div>
          <div class="toolbar">
            <input class="input" id="searchInput" placeholder="搜索姓名或备注">
            <select class="select" id="filterSelect">
              <option value="all">全部</option>
              <option value="upcoming">即将到来</option>
              <option value="today">今天</option>
              <option value="dayBefore">需提前提醒</option>
            </select>
          </div>
          <div class="list" id="birthdayList"></div>
        </div>
      </section>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite">
    <strong id="toastTitle"></strong>
    <span id="toastMessage"></span>
  </div>

  <script>
    const storageKey = "birthday-reminder-records-v1";
    const notifiedKey = "birthday-reminder-notified-v1";
    const records = loadRecords();
    const state = {
      search: "",
      filter: "all",
    };

    const els = {
      form: document.querySelector("#birthdayForm"),
      name: document.querySelector("#nameInput"),
      date: document.querySelector("#dateInput"),
      note: document.querySelector("#noteInput"),
      dayBefore: document.querySelector("#dayBeforeInput"),
      file: document.querySelector("#fileInput"),
      pickFile: document.querySelector("#pickFileButton"),
      dropzone: document.querySelector("#dropzone"),
      list: document.querySelector("#birthdayList"),
      total: document.querySelector("#totalCount"),
      today: document.querySelector("#todayCount"),
      week: document.querySelector("#weekCount"),
      search: document.querySelector("#searchInput"),
      filter: document.querySelector("#filterSelect"),
      notify: document.querySelector("#notifyButton"),
      export: document.querySelector("#exportButton"),
      calendar: document.querySelector("#calendarButton"),
      clear: document.querySelector("#clearButton"),
      toast: document.querySelector("#toast"),
      toastTitle: document.querySelector("#toastTitle"),
      toastMessage: document.querySelector("#toastMessage"),
    };

    render();
    checkReminders();
    setInterval(checkReminders, 60 * 1000);

    els.form.addEventListener("submit", (event) => {
      event.preventDefault();
      const birthday = normalizeDate(els.date.value);
      if (!birthday) {
        showToast("日期格式不对", "请填写一个能识别的生日日期。");
        return;
      }

      addRecords([{
        name: els.name.value.trim(),
        birthday,
        note: els.note.value.trim(),
        dayBefore: els.dayBefore.checked,
      }]);

      els.form.reset();
      els.dayBefore.checked = true;
      els.name.focus();
    });

    els.pickFile.addEventListener("click", () => els.file.click());
    els.file.addEventListener("change", async () => {
      const file = els.file.files[0];
      if (file) await importFile(file);
      els.file.value = "";
    });

    ["dragenter", "dragover"].forEach((name) => {
      els.dropzone.addEventListener(name, (event) => {
        event.preventDefault();
        els.dropzone.classList.add("dragging");
      });
    });

    ["dragleave", "drop"].forEach((name) => {
      els.dropzone.addEventListener(name, (event) => {
        event.preventDefault();
        els.dropzone.classList.remove("dragging");
      });
    });

    els.dropzone.addEventListener("drop", async (event) => {
      const file = event.dataTransfer.files[0];
      if (file) await importFile(file);
    });

    els.search.addEventListener("input", () => {
      state.search = els.search.value.trim().toLowerCase();
      render();
    });

    els.filter.addEventListener("change", () => {
      state.filter = els.filter.value;
      render();
    });

    els.notify.addEventListener("click", async () => {
      if (!("Notification" in window)) {
        showToast("浏览器不支持", "当前浏览器无法发送系统通知，但页面内提醒仍可使用。");
        return;
      }

      const permission = await Notification.requestPermission();
      if (permission === "granted") {
        showToast("通知已开启", "这个页面打开时，会为今天和提前一天提醒发送通知。");
        checkReminders(true);
      } else {
        showToast("通知未开启", "可以继续使用页面内提醒，也可以稍后在浏览器里重新授权。");
      }
    });

    els.export.addEventListener("click", () => {
      if (!records.length) {
        showToast("还没有记录", "添加或导入生日后再导出。");
        return;
      }

      const header = ["姓名", "生日", "备注", "提前一天提醒"];
      const rows = records.map((record) => [
        record.name,
        record.birthday,
        record.note || "",
        record.dayBefore ? "是" : "否",
      ]);
      const csv = [header, ...rows].map((row) => row.map(escapeCsv).join(",")).join("\n");
      downloadFile("\ufeff" + csv, "birthday-reminders.csv", "text/csv;charset=utf-8");
    });

    els.calendar.addEventListener("click", () => {
      if (!records.length) {
        showToast("还没有记录", "添加或导入生日后再导出日历。");
        return;
      }

      const ics = buildCalendar(records);
      downloadFile(ics, "birthday-reminders.ics", "text/calendar;charset=utf-8");
      showToast("日历已导出", "把 .ics 文件发送到手机并打开，就可以导入系统日历。");
    });

    els.clear.addEventListener("click", () => {
      if (!records.length) return;
      const confirmed = confirm("确定要清空全部生日记录吗？");
      if (!confirmed) return;
      records.splice(0, records.length);
      saveRecords();
      render();
      showToast("已清空", "所有生日记录已删除。");
    });

    els.list.addEventListener("click", (event) => {
      const button = event.target.closest("[data-delete]");
      if (!button) return;
      const id = button.dataset.delete;
      const index = records.findIndex((record) => record.id === id);
      if (index >= 0) {
        records.splice(index, 1);
        saveRecords();
        render();
      }
    });

    async function importFile(file) {
      try {
        const extension = file.name.split(".").pop().toLowerCase();
        let rows;

        if (["xlsx", "xls"].includes(extension)) {
          rows = await parseWorkbook(file);
        } else {
          const text = await file.text();
          rows = parseDelimited(text, extension === "tsv" ? "\t" : null);
        }

        const imported = rowsToRecords(rows);
        if (!imported.length) {
          showToast("没有识别到生日", "请确认表格里有姓名和生日两列。");
          return;
        }

        addRecords(imported);
        showToast("导入完成", `已导入 ${imported.length} 条生日记录。`);
      } catch (error) {
        showToast("导入失败", error.message || "文件内容没有成功读取。");
      }
    }

    async function parseWorkbook(file) {
      if (!window.XLSX) {
        throw new Error("读取 Excel 需要联网加载组件；也可以把文件另存为 CSV 后导入。");
      }

      const buffer = await file.arrayBuffer();
      const workbook = XLSX.read(buffer, { type: "array", cellDates: true });
      const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
      return XLSX.utils.sheet_to_json(firstSheet, { header: 1, raw: false, defval: "" });
    }

    function parseDelimited(text, forcedDelimiter) {
      const normalized = text.replace(/^\ufeff/, "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
      const delimiter = forcedDelimiter || detectDelimiter(normalized);
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < normalized.length; i += 1) {
        const char = normalized[i];
        const next = normalized[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          cell += '"';
          i += 1;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === delimiter && !inQuotes) {
          row.push(cell.trim());
          cell = "";
        } else if (char === "\n" && !inQuotes) {
          row.push(cell.trim());
          if (row.some(Boolean)) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      row.push(cell.trim());
      if (row.some(Boolean)) rows.push(row);
      return rows;
    }

    function detectDelimiter(text) {
      const firstLine = text.split("\n").find((line) => line.trim()) || "";
      const candidates = [",", "\t", ";", "|"];
      return candidates
        .map((delimiter) => ({ delimiter, count: firstLine.split(delimiter).length }))
        .sort((a, b) => b.count - a.count)[0].delimiter;
    }

    function rowsToRecords(rows) {
      if (!rows.length) return [];
      const headerInfo = findHeader(rows);
      const start = headerInfo.hasHeader ? 1 : 0;
      const nameIndex = headerInfo.nameIndex;
      const birthdayIndex = headerInfo.birthdayIndex;
      const noteIndex = headerInfo.noteIndex;
      const dayBeforeIndex = headerInfo.dayBeforeIndex;

      return rows.slice(start).map((row) => {
        const birthday = normalizeDate(row[birthdayIndex]);
        const name = String(row[nameIndex] || "").trim();
        if (!name || !birthday) return null;
        return {
          name,
          birthday,
          note: noteIndex >= 0 ? String(row[noteIndex] || "").trim() : "",
          dayBefore: dayBeforeIndex >= 0 ? toBoolean(row[dayBeforeIndex]) : true,
        };
      }).filter(Boolean);
    }

    function findHeader(rows) {
      const first = rows[0].map((cell) => String(cell || "").trim().toLowerCase());
      const nameWords = ["姓名", "名字", "名称", "name", "person", "联系人", "好友"];
      const birthdayWords = ["生日", "出生日期", "birthday", "birthdate", "dob", "date", "日期"];
      const noteWords = ["备注", "note", "notes", "关系", "说明"];
      const dayBeforeWords = ["提前一天提醒", "提前提醒", "remind", "reminder", "daybefore"];

      const nameIndex = first.findIndex((cell) => nameWords.some((word) => cell.includes(word)));
      const birthdayIndex = first.findIndex((cell) => birthdayWords.some((word) => cell.includes(word)));
      const noteIndex = first.findIndex((cell) => noteWords.some((word) => cell.includes(word)));
      const dayBeforeIndex = first.findIndex((cell) => dayBeforeWords.some((word) => cell.includes(word)));

      if (nameIndex >= 0 && birthdayIndex >= 0) {
        return { hasHeader: true, nameIndex, birthdayIndex, noteIndex, dayBeforeIndex };
      }

      const guessedBirthday = guessDateColumn(rows);
      const guessedName = rows[0].findIndex((_, index) => index !== guessedBirthday);
      return {
        hasHeader: false,
        nameIndex: guessedName >= 0 ? guessedName : 0,
        birthdayIndex: guessedBirthday >= 0 ? guessedBirthday : 1,
        noteIndex: -1,
        dayBeforeIndex: -1,
      };
    }

    function guessDateColumn(rows) {
      const width = Math.max(...rows.slice(0, 8).map((row) => row.length));
      let best = -1;
      let bestScore = 0;

      for (let col = 0; col < width; col += 1) {
        const score = rows.slice(0, 8).filter((row) => normalizeDate(row[col])).length;
        if (score > bestScore) {
          best = col;
          bestScore = score;
        }
      }

      return best;
    }

    function normalizeDate(value) {
      if (value instanceof Date && !Number.isNaN(value.getTime())) {
        return formatDate(value);
      }

      const raw = String(value || "").trim();
      if (!raw) return "";

      const chinese = raw.match(/(?:(\d{2,4})\s*年)?\s*(\d{1,2})\s*月\s*(\d{1,2})\s*日?/);
      if (chinese) {
        const year = chinese[1] ? normalizeYear(Number(chinese[1])) : new Date().getFullYear();
        return validDate(year, Number(chinese[2]), Number(chinese[3]));
      }

      const numeric = raw.match(/^(\d{1,4})[./-](\d{1,2})(?:[./-](\d{1,4}))?$/);
      if (numeric) {
        const a = Number(numeric[1]);
        const b = Number(numeric[2]);
        const c = numeric[3] ? Number(numeric[3]) : null;

        if (c === null) {
          return validDate(new Date().getFullYear(), a, b);
        }

        if (String(numeric[1]).length === 4) {
          return validDate(a, b, c);
        }

        if (String(numeric[3]).length === 4) {
          return validDate(c, a, b);
        }

        return validDate(normalizeYear(c), a, b);
      }

      const date = new Date(raw);
      if (!Number.isNaN(date.getTime())) {
        return formatDate(date);
      }

      return "";
    }

    function normalizeYear(year) {
      if (year < 100) return year >= 50 ? 1900 + year : 2000 + year;
      return year;
    }

    function validDate(year, month, day) {
      const date = new Date(year, month - 1, day);
      if (date.getFullYear() !== year || date.getMonth() !== month - 1 || date.getDate() !== day) {
        return "";
      }
      return formatDate(date);
    }

    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function addRecords(newRecords) {
      const normalized = newRecords
        .filter((record) => record.name && record.birthday)
        .map((record) => ({
          id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
          name: record.name,
          birthday: record.birthday,
          note: record.note || "",
          dayBefore: Boolean(record.dayBefore),
          createdAt: new Date().toISOString(),
        }));

      records.push(...normalized);
      records.sort((a, b) => daysUntil(a.birthday) - daysUntil(b.birthday) || a.name.localeCompare(b.name, "zh-Hans-CN"));
      saveRecords();
      render();

      if (normalized.length === 1) {
        showToast("已添加", `${normalized[0].name} 的生日已记录。`);
      }
    }

    function render() {
      const enriched = records.map((record) => ({
        ...record,
        days: daysUntil(record.birthday),
        age: nextAge(record.birthday),
      }));

      els.total.textContent = records.length;
      els.today.textContent = enriched.filter((record) => record.days === 0).length;
      els.week.textContent = enriched.filter((record) => record.days >= 0 && record.days <= 7).length;

      const visible = enriched.filter((record) => {
        const matchesSearch = !state.search ||
          record.name.toLowerCase().includes(state.search) ||
          (record.note || "").toLowerCase().includes(state.search);
        const matchesFilter =
          state.filter === "all" ||
          (state.filter === "upcoming" && record.days <= 30) ||
          (state.filter === "today" && record.days === 0) ||
          (state.filter === "dayBefore" && record.dayBefore);
        return matchesSearch && matchesFilter;
      }).sort((a, b) => a.days - b.days || a.name.localeCompare(b.name, "zh-Hans-CN"));

      if (!visible.length) {
        els.list.innerHTML = `
          <div class="empty">
            <div>
              <strong>${records.length ? "没有匹配记录" : "还没有生日记录"}</strong>
              <p>${records.length ? "换个搜索词或筛选条件试试。" : "从左侧手动添加，或导入 CSV/TSV 表格。"}</p>
            </div>
          </div>
        `;
        return;
      }

      els.list.innerHTML = visible.map((record) => {
        const badge = record.days === 0
          ? `<span class="badge today">今天</span>`
          : record.days === 1
            ? `<span class="badge tomorrow">明天</span>`
            : `<span class="badge">${record.days} 天后</span>`;
        const className = record.days === 0 ? "due" : record.days === 1 && record.dayBefore ? "tomorrow" : "";
        return `
          <article class="person ${className}">
            <div class="person-main">
              <div class="name-line">
                <strong title="${escapeHtml(record.name)}">${escapeHtml(record.name)}</strong>
                ${badge}
              </div>
              <div class="details">
                <span>${formatBirthday(record.birthday)}</span>
                <span>${record.age ? `将满 ${record.age} 岁` : "未记录年份"}</span>
                <span>${record.dayBefore ? "提前一天提醒" : "仅当天提醒"}</span>
                ${record.note ? `<span>${escapeHtml(record.note)}</span>` : ""}
              </div>
            </div>
            <button class="icon-btn" type="button" data-delete="${record.id}" title="删除 ${escapeHtml(record.name)}">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 6h18"></path>
                <path d="M8 6V4h8v2"></path>
                <path d="M19 6l-1 14H6L5 6"></path>
              </svg>
            </button>
          </article>
        `;
      }).join("");
    }

    function checkReminders(force = false) {
      const todayKey = formatDate(new Date());
      const notified = JSON.parse(localStorage.getItem(notifiedKey) || "{}");
      const due = records.filter((record) => {
        const days = daysUntil(record.birthday);
        return days === 0 || (record.dayBefore && days === 1);
      });

      if (!due.length) return;

      const names = due.map((record) => `${record.name}${daysUntil(record.birthday) === 1 ? " 明天" : " 今天"}`).join("、");
      if (force || notified.date !== todayKey) {
        showToast("生日提醒", names);
      }

      if ("Notification" in window && Notification.permission === "granted" && (force || notified.date !== todayKey)) {
        new Notification("生日提醒", { body: names });
      }

      localStorage.setItem(notifiedKey, JSON.stringify({ date: todayKey }));
    }

    function daysUntil(birthday) {
      const today = startOfDay(new Date());
      const source = new Date(`${birthday}T00:00:00`);
      let next = new Date(today.getFullYear(), source.getMonth(), source.getDate());
      if (next < today) {
        next = new Date(today.getFullYear() + 1, source.getMonth(), source.getDate());
      }
      return Math.round((next - today) / 86400000);
    }

    function nextAge(birthday) {
      const date = new Date(`${birthday}T00:00:00`);
      if (date.getFullYear() === new Date().getFullYear()) return "";
      const today = startOfDay(new Date());
      const thisYearsBirthday = new Date(today.getFullYear(), date.getMonth(), date.getDate());
      const nextBirthdayYear = thisYearsBirthday < today ? today.getFullYear() + 1 : today.getFullYear();
      return Math.max(0, nextBirthdayYear - date.getFullYear());
    }

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function formatBirthday(birthday) {
      const date = new Date(`${birthday}T00:00:00`);
      return `${date.getMonth() + 1}月${date.getDate()}日`;
    }

    function toBoolean(value) {
      const text = String(value || "").trim().toLowerCase();
      return !["否", "不", "false", "0", "no", "n", "off", "仅当天"].includes(text);
    }

    function loadRecords() {
      try {
        return JSON.parse(localStorage.getItem(storageKey) || "[]");
      } catch {
        return [];
      }
    }

    function saveRecords() {
      localStorage.setItem(storageKey, JSON.stringify(records));
    }

    function buildCalendar(items) {
      const now = toIcsDateTime(new Date());
      const lines = [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "PRODID:-//Birthday Reminder//CN",
        "CALSCALE:GREGORIAN",
        "METHOD:PUBLISH",
        "X-WR-CALNAME:生日提醒",
      ];

      items.forEach((record) => {
        const start = new Date(`${record.birthday}T00:00:00`);
        const end = new Date(start);
        end.setDate(end.getDate() + 1);
        const uid = `${record.id || `${record.name}-${record.birthday}`}@birthday-reminder.local`;
        const trigger = record.dayBefore ? "-P1D" : "PT0S";
        const alarmText = record.dayBefore
          ? `${record.name} 明天过生日`
          : `${record.name} 今天过生日`;

        lines.push(
          "BEGIN:VEVENT",
          `UID:${escapeIcs(uid)}`,
          `DTSTAMP:${now}`,
          `DTSTART;VALUE=DATE:${toIcsDate(start)}`,
          `DTEND;VALUE=DATE:${toIcsDate(end)}`,
          "RRULE:FREQ=YEARLY",
          `SUMMARY:${escapeIcs(`${record.name} 生日`)}`,
          `DESCRIPTION:${escapeIcs(record.note || "生日提醒")}`,
          "TRANSP:TRANSPARENT",
          "BEGIN:VALARM",
          "ACTION:DISPLAY",
          `DESCRIPTION:${escapeIcs(alarmText)}`,
          `TRIGGER;RELATED=START:${trigger}`,
          "END:VALARM",
          "END:VEVENT",
        );
      });

      lines.push("END:VCALENDAR");
      return `${lines.join("\r\n")}\r\n`;
    }

    function toIcsDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}${month}${day}`;
    }

    function toIcsDateTime(date) {
      const year = date.getUTCFullYear();
      const month = String(date.getUTCMonth() + 1).padStart(2, "0");
      const day = String(date.getUTCDate()).padStart(2, "0");
      const hours = String(date.getUTCHours()).padStart(2, "0");
      const minutes = String(date.getUTCMinutes()).padStart(2, "0");
      const seconds = String(date.getUTCSeconds()).padStart(2, "0");
      return `${year}${month}${day}T${hours}${minutes}${seconds}Z`;
    }

    function escapeIcs(value) {
      return String(value ?? "")
        .replace(/\\/g, "\\\\")
        .replace(/\n/g, "\\n")
        .replace(/,/g, "\\,")
        .replace(/;/g, "\\;");
    }

    function downloadFile(content, filename, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    function escapeCsv(value) {
      const text = String(value ?? "");
      return /[",\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    let toastTimer;
    function showToast(title, message) {
      els.toastTitle.textContent = title;
      els.toastMessage.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => els.toast.classList.remove("show"), 4200);
    }
  </script>
</body>
</html>
